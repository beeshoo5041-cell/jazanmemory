<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إدارة ذاكرة جازان</title><link rel="stylesheet" href="styles.css"></head><body><header class="topbar"><a class="brand" href="index.html"><span class="mark">◇</span><span><b>ذاكرة جازان</b><small>لوحة الإدارة</small></span></a><nav><a href="index.html">الرئيسية</a><a href="member.html">الأعضاء</a><a class="active" href="admin.html">الإدارة</a></nav><button id="logoutBtn" class="logout hidden">خروج</button></header><main class="dash"><section id="loginBox" class="panel"><h1>دخول الإدارة</h1><p class="hint">الدخول للمديرة فقط حسب البريد الموجود في firebase-config.js.</p><form id="loginForm" class="form"><label>البريد الإلكتروني<input id="email" type="email" required></label><label>كلمة المرور<input id="password" type="password" required></label><button>دخول الإدارة</button></form><p id="loginMsg" class="msg"></p></section><section id="notAdminBox" class="panel danger hidden"><h1>ليست لديك صلاحية إدارة</h1><p>هذا الحساب عضو عادي وليس حساب إدارة.</p></section><section id="adminBox" class="panel hidden"><h1>إضافة مباشرة من الإدارة</h1><form id="contentForm" class="form"><label>العنوان<input id="title" required></label><label>التاريخ<input id="date"></label><label>الموقع<input id="location"></label><label>القسم<select id="region"><option>تهامة جازان</option><option>السفوح والمرتفعات</option><option>الساحل والجزر</option></select></label><label>النوع<select id="type"><option>وثيقة رقمية</option><option>صورة نادرة</option><option>مخطوطة</option><option>خريطة ومخطط</option><option>تراث ثقافي</option></select></label><label>الوصف<textarea id="desc"></textarea></label><label>ملف أو صورة<input id="file" type="file" accept="image/*,.pdf"></label><button>نشر مباشرة</button></form><p id="saveMsg" class="msg"></p></section><section id="moderationBox" class="panel hidden wide"><div class="head"><h2>بانتظار المراجعة</h2><span id="pendingStatus"></span></div><div id="pendingList" class="adminList"></div></section><section id="publishedBox" class="panel hidden wide"><div class="head"><h2>المحتوى المنشور</h2><span id="publishedStatus"></span></div><div id="publishedList" class="adminList"></div></section></main><script type="module" src="firebase-config.js"></script><script type="module" src="admin.js"></script></body></html>

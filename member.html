<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>الأعضاء | ذاكرة جازان</title><link rel="stylesheet" href="styles.css"></head><body><header class="topbar"><a class="brand" href="index.html"><span class="mark">◇</span><span><b>ذاكرة جازان</b><small>منطقة الأعضاء</small></span></a><nav><a href="index.html">الرئيسية</a><a class="active" href="member.html">الأعضاء</a></nav><button id="logoutBtn" class="logout hidden">خروج</button></header><main class="dash"><section id="loginBox" class="panel"><h1>دخول أو تسجيل عضو</h1><p class="hint">الإضافات لا تظهر للعامة إلا بعد اعتماد الإدارة.</p><form id="loginForm" class="form"><label>البريد الإلكتروني<input id="email" type="email" required></label><label>كلمة المرور<input id="password" type="password" required></label><div class="row"><button>دخول</button><button type="button" id="registerBtn" class="secondary">تسجيل عضو جديد</button></div></form><p id="loginMsg" class="msg"></p></section><section id="blockedBox" class="panel danger hidden"><h1>الحساب محظور</h1><p>تم إيقاف إمكانية الإضافة من هذا الحساب.</p></section><section id="memberBox" class="panel hidden"><h1>إضافة محتوى للمراجعة</h1><form id="contentForm" class="form"><label>العنوان<input id="title" required></label><label>التاريخ<input id="date"></label><label>الموقع<input id="location"></label><label>القسم<select id="region"><option>تهامة جازان</option><option>السفوح والمرتفعات</option><option>الساحل والجزر</option></select></label><label>النوع<select id="type"><option>وثيقة رقمية</option><option>صورة نادرة</option><option>مخطوطة</option><option>خريطة ومخطط</option><option>تراث ثقافي</option></select></label><label>الوصف<textarea id="desc"></textarea></label><label>ملف أو صورة<input id="file" type="file" accept="image/*,.pdf"></label><button>إرسال للمراجعة</button></form><p id="saveMsg" class="msg"></p></section><section id="myBox" class="panel hidden wide"><div class="head"><h2>إضافاتي</h2><span id="myStatus"></span></div><div id="myList" class="adminList"></div></section></main><script type="module" src="firebase-config.js"></script><script type="module" src="member.js"></script></body></html>
